name: Informe IA — refresh diario automático

on:
  schedule:
    # Lunes a viernes, 9:00 AM Argentina (UTC-3) = 12:00 UTC
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Despertar Railway
        run: |
          echo "Verificando que Railway esté activo..."
          curl -sf "https://sinap-production.up.railway.app/health" \
            --max-time 30 \
            -w "Health: HTTP %{http_code} en %{time_total}s\n" \
            || echo "Warning: health check tardó — continuando igual"
          sleep 3

      - name: Refresh informe IA
        run: |
          echo "Regenerando informe IA..."
          RESPONSE=$(curl -s --max-time 120 \
            -w "\nHTTP_STATUS:%{http_code}" \
            "https://sinap-production.up.railway.app/informe?force=true")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Respuesta HTTP: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: informe devolvió HTTP $HTTP_STATUS"
            echo "$RESPONSE" | head -c 800
            exit 1
          fi
          echo "OK: informe regenerado correctamente."
