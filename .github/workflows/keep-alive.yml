name: Keep Railway alive

on:
  schedule:
    # Cada 10 minutos — Railway duerme después de ~30 min de inactividad
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway health
        run: |
          echo "Pingeando Railway..."
          curl -sf "https://sinap-production.up.railway.app/health" \
            -o /dev/null -w "HTTP status: %{http_code}\n" \
            || echo "Railway no respondió — puede estar reiniciando"
